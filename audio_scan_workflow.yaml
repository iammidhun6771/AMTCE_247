name: "audio-module-scan"
description: "Agent-to-Agent pipeline scanning audio modules using DeepSeek for logic and Gemini for Vision"

steps:
  - id: analyze-code
    name: "DeepSeek Reasoning Analysis"
    agentType: "architect"
    model: "deepseek-reasoner"
    task: "Analyze the architecture and logic of Python files in Audio_Modules. Identify bugs, inefficiencies, and suggest improvements."
    target: "Audio_Modules/"
    
  - id: graphify-visual
    name: "Gemini Vision Graph Analysis"
    agentType: "reviewer"
    model: "gemini-2.5-flash"
    task: "Take the AST graph output generated by Graphify for Audio_Modules, interpret the visual dependencies and boundaries, and cross-reference with the logic analysis."
    dependsOn: ["analyze-code"]
    
  - id: return-summary
    name: "Final Synthesis"
    agentType: "coordinator"
    model: "gemini-2.5-flash"
    task: "Synthesize the DeepSeek code analysis and Gemini graph analysis into a final report and return it to the root agent (Antigravity)."
    dependsOn: ["graphify-visual"]
